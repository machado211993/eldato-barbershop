<div class="vi" [class.vi--leaving]="isLeaving">

  <img class="vi__bg" src="assets/images/barber_inicio.jpeg" alt="" />

  <!-- Overlay se oscurece progresivamente cuando aparece el contenido -->
  <div class="vi__overlay" [class.vi__overlay--dark]="showContent"></div>

  <!-- Brand + botones: visibles después del segundo inicial -->
  <div class="vi__content" [class.vi__content--show]="showContent">

    <div class="vi__brand">
      <div class="vi__accent-line"></div>
      <h1 class="vi__name">El Dato</h1>
      <span class="vi__type">Barbershop</span>
      <p class="vi__tagline">Estilo &nbsp;·&nbsp; Precisión &nbsp;·&nbsp; Carácter</p>
    </div>

    <div class="vi__buttons" [class.vi__buttons--show]="showButtons">
      <button class="vi__btn vi__btn--primary" (click)="goToSection('reservar')">
        <i class="fas fa-calendar-check"></i>
        Reservar Turno
      </button>
      <button class="vi__btn vi__btn--whatsapp" (click)="openWhatsApp()">
        <i class="fab fa-whatsapp"></i>
        WhatsApp
      </button>
      <button class="vi__btn vi__btn--ghost" (click)="goToSection('galeria')">
        <i class="fas fa-images"></i>
        Ver Trabajos
      </button>
      <a
        class="vi__btn vi__btn--dev"
        href="https://wa.me/5493795694391?text=Hola%20MJ%20Solutions!%20Vi%20tu%20trabajo%20en%20El%20Dato%20Barbershop%20y%20me%20gustar%C3%ADa%20hablar%20sobre%20una%20web."
        target="_blank"
      >
        <i class="fas fa-laptop-code"></i>
        ¿Necesitás una web?
      </a>
    </div>

  </div>

  <!-- Saltar: visible después de 1.5s -->
  <button class="vi__skip" *ngIf="!showContent" (click)="skipIntro()">
    Saltar &nbsp;<i class="fas fa-forward"></i>
  </button>

  <!-- Botón del programador (visible durante el intro, el componente global queda detrás) -->
  <a
    class="vi__dev-btn"
    href="https://wa.me/5493795694391?text=Hola%20MJ%20Solutions!%20Vi%20tu%20trabajo%20en%20El%20Dato%20Barbershop%20y%20me%20gustar%C3%ADa%20hablar%20sobre%20una%20web."
    target="_blank"
    title="¿Necesitás una web? Contactá a MJ Solutions"
  >
    <i class="fas fa-laptop-code"></i>
    <span class="vi__dev-tooltip">
      <span class="vi__dev-tooltip__title">¿Necesitás una web?</span>
      <span class="vi__dev-tooltip__sub">MJ Solutions →</span>
    </span>
  </a>

</div>
